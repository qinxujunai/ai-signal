name: AI Signal Daily Digest

on:
  schedule:
    - cron: '45 1 * * *'  # 09:45 Beijing — generate
    - cron: '0 2 * * *'   # 10:00 Beijing — send
  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage (generate/send/full)'
        required: false
        default: 'full'

jobs:
  generate:
    if: github.event.schedule == '45 1 * * *' || (github.event_name == 'workflow_dispatch' && inputs.stage != 'send')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd scripts && npm install
      - run: |
          mkdir -p ~/.ai-signal/drafts
          echo '${{ secrets.AI_SIGNAL_CONFIG }}' > ~/.ai-signal/config.json
          cat > ~/.ai-signal/.env << 'ENVEOF'
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          QQ_EMAIL=${{ secrets.QQ_EMAIL }}
          QQ_SMTP_AUTH=${{ secrets.QQ_SMTP_AUTH }}
          ENVEOF
      - run: cd scripts && node prepare-digest.js --out ~/.ai-signal/drafts/$(date +%F).json && node remix-digest.js --file ~/.ai-signal/drafts/$(date +%F).json --out ~/.ai-signal/drafts/$(date +%F).html

  send:
    if: github.event.schedule == '0 2 * * *' || (github.event_name == 'workflow_dispatch' && inputs.stage != 'generate')
    runs-on: ubuntu-latest
    needs: generate
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd scripts && npm install
      - run: |
          mkdir -p ~/.ai-signal/drafts
          echo '${{ secrets.AI_SIGNAL_CONFIG }}' > ~/.ai-signal/config.json
          cat > ~/.ai-signal/.env << 'ENVEOF'
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          QQ_EMAIL=${{ secrets.QQ_EMAIL }}
          QQ_SMTP_AUTH=${{ secrets.QQ_SMTP_AUTH }}
          ENVEOF
      - run: cd scripts && node deliver.js --file ~/.ai-signal/drafts/$(date +%F).html --force

  health-check:
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd scripts && node check-feed-health.js
        continue-on-error: true
