name: AI Signal Daily Digest

on:
  schedule:
    - cron: '0 2 * * *'   # 10:00 Beijing = 02:00 UTC — generate + send
  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage (full/generate/send)'
        required: false
        default: 'full'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Prepare config
        run: |
          mkdir -p ~/.ai-signal/drafts ~/.ai-signal/tmp
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" > ~/.ai-signal/.env
          echo "DEEPSEEK_MODEL=deepseek-chat" >> ~/.ai-signal/.env
          echo "QQ_EMAIL=${{ secrets.QQ_EMAIL }}" >> ~/.ai-signal/.env
          echo "QQ_SMTP_AUTH=${{ secrets.QQ_SMTP_AUTH }}" >> ~/.ai-signal/.env
          echo '${{ secrets.AI_SIGNAL_CONFIG }}' > ~/.ai-signal/config.json

      - name: Fetch feeds
        run: cd scripts && node prepare-digest.js --out ~/.ai-signal/drafts/${{ github.run_id }}.json

      - name: LLM remix (DeepSeek v4-flash)
        run: cd scripts && node remix-digest.js --file ~/.ai-signal/drafts/${{ github.run_id }}.json --out ~/.ai-signal/drafts/${{ github.run_id }}.html

      - name: Send email
        run: cd scripts && node deliver.js --file ~/.ai-signal/drafts/${{ github.run_id }}.html --force

      - name: Upload artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: ~/.ai-signal/drafts/
          retention-days: 7
