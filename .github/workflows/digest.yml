name: AI Signal Daily Digest

on:
  schedule:
    # 每天 10:00 北京时间 (UTC+8 → 02:00 UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Write config
        run: |
          mkdir -p ~/.ai-signal
          echo '${{ secrets.AI_SIGNAL_CONFIG }}' > ~/.ai-signal/config.json
          cat > ~/.ai-signal/.env << 'ENVEOF'
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          ENVEOF

      - name: Run digest pipeline
        run: cd scripts && node prepare-digest.js | node remix-digest.js | node deliver.js --force

      - name: Check feed health
        run: cd scripts && node check-feed-health.js
        continue-on-error: true
